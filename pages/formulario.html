<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Menta</title>
    <meta name="description" content="Cuéntanos tu proyecto y te respondemos en menos de 24 horas. Diseño web profesional desde $500.000.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/header.css">
    <link rel="stylesheet" href="../assets/css/formulario.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link rel="stylesheet" href="../assets/css/footer.css">
    <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </noscript>
</head>
<body>
    <div id="header"></div>

    <div class="mesh-gradient">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- HERO -->
    <div class="contacto-hero">
        <p class="contacto-hero__tag reveal">Contacto</p>
        <h1 class="contacto-hero__titulo reveal">Hablemos de<br><span>tu proyecto</span></h1>
        <p class="contacto-hero__desc reveal">Cuéntanos qué necesitas y te respondemos en menos de 24 horas con una propuesta sin compromiso.</p>
    </div>

    <!-- FORMULARIO -->
    <section class="formulario">
        <div class="formulario__inner">

            <div class="formulario__info reveal">
                <div class="formulario__dato">
                    <p>WhatsApp</p>
                    <p>+57 321 9317510</p>
                </div>
                <div class="formulario__dato">
                    <p>Tiempo de respuesta</p>
                    <p>Menos de 24 horas</p>
                </div>
                <div class="formulario__dato">
                    <p>Disponibilidad</p>
                    <p>Disponibles para nuevos proyectos</p>
                </div>
            </div>

            <form class="formulario__form reveal" action="https://formspree.io/f/mpqyljaq" method="POST">

                <div class="formulario__fila">
                    <div class="formulario__grupo">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                    </div>
                    <div class="formulario__grupo">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                    </div>
                </div>

                <div class="formulario__fila">
                    <div class="formulario__grupo">
                        <label for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" name="telefono" placeholder="+57 300 000 0000">
                    </div>
                    <div class="formulario__grupo">
                        <label for="servicio">Tipo de servicio</label>
                        <select id="servicio" name="servicio" required>
                            <option value="" disabled selected>Selecciona un servicio</option>
                            <option value="landing">Landing Page — $500.000</option>
                            <option value="corporativa">Web Corporativa — 800.000</option>
                            <option value="mejora">Mejora tu Web — Consultar</option>
                        </select>
                    </div>
                </div>

                <div class="formulario__grupo">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" placeholder="Cuéntanos qué necesitas..." rows="5" required></textarea>
                </div>

                <button type="submit" class="formulario__btn">
                    Enviar mensaje
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>

            </form>

        </div>
    </section>

    <div id="footer" class="footer"></div>

    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/animations.js"></script>
</body>
</html>
